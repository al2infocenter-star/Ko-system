<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Kösystem</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.12/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.12/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#f4f4f4; }
.container { max-width:700px; margin:auto; padding:20px; }

input, select, button { padding:10px; margin:5px; }

.queue-item {
  background:white;
  margin:8px;
  padding:10px;
  border-radius:8px;
  text-align:left;
}

.red { background:#ffcccc; }
.yellow { background:#fff3cd; }
.green { background:#d4edda; }

.mybox {
  margin-top:15px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kösystem</h2>

<!-- LOGIN -->
<input type="password" id="password" placeholder="Lösenord">
<br>
<button onclick="login()">Logga in</button>

<div id="app" style="display:none">

<hr>

<button onclick="setRole('employee')">Medarbetare</button>
<button onclick="setRole('leader')">Arbetsledare</button>

<hr>

<!-- EMPLOYEE -->
<div id="employee" style="display:none">

<input id="empName" placeholder="Namn">

<br>

<label>Prio:</label>
<select id="priority">
  <option value="red">HÖG</option>
  <option value="yellow">MEDEL</option>
  <option value="green">LÅG</option>
</select>

<br>

<button onclick="joinQueue()">Ställ dig i kö</button>

<div id="myBox" class="mybox" style="display:none"></div>

</div>

<!-- LEADER -->
<div id="leader" style="display:none">

<input id="leaderName" placeholder="Ditt namn">

<h3>Kö</h3>
<div id="queueList"></div>

</div>

</div>
</div>

<script>

// ================= DEBUG =================
console.log("SCRIPT LADDADE");

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyC3lF1OGlr4em-jUQkz3a-UoeKMOQyFCYw",
  authDomain: "ko-system-ce728.firebaseapp.com",
  projectId: "ko-system-ce728"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

console.log("Firebase init klar");

// ================= STATE =================
let currentUserId = null;

const prio = { red:1, yellow:2, green:3 };

// ================= LOGIN =================
function login(){
  if(document.getElementById("password").value === "1234"){
    document.getElementById("app").style.display = "block";
  } else {
    alert("Fel lösenord");
  }
}

// ================= ROLE =================
function setRole(role){
  document.getElementById("employee").style.display = "none";
  document.getElementById("leader").style.display = "none";

  document.getElementById(role).style.display = "block";
}

// ================= JOIN =================
function joinQueue(){

  console.log("KNAPP TRYCKT");

  let name = document.getElementById("empName").value;
  let priority = document.getElementById("priority").value;

  if(!name) return alert("Skriv namn");

  db.collection("queue").add({
    name,
    priority,
    time: Date.now(),
    takenBy: null
  }).then(doc=>{
    console.log("SKRIVER TILL FIREBASE");
    currentUserId = doc.id;
  });
}

// ================= EMPLOYEE =================
function removeMy(){
  if(!currentUserId) return;

  db.collection("queue").doc(currentUserId).delete();
  currentUserId = null;
}

// ================= LEADER =================
function take(id){
  let leader = document.getElementById("leaderName").value;
  if(!leader) return alert("Skriv namn");

  db.collection("queue").doc(id).update({
    takenBy: leader
  });
}

function done(id){
  db.collection("queue").doc(id).delete();
}

// ================= REALTIME =================
db.collection("queue").onSnapshot(snapshot=>{

  let items = [];
  snapshot.forEach(d=>items.push({id:d.id,...d.data()}));

  items.sort((a,b)=>{
    if(prio[a.priority] !== prio[b.priority]){
      return prio[a.priority] - prio[b.priority];
    }
    return a.time - b.time;
  });

  // LEADER
  let list = document.getElementById("queueList");
  if(list){
    list.innerHTML = "";

    items.forEach((q,i)=>{

      let div = document.createElement("div");
      div.className = "queue-item " + q.priority;

      div.innerHTML = `
        <b>${i+1}. ${q.name}</b><br>
        ${q.priority.toUpperCase()}<br>
        ${q.takenBy || "Ej paxad"}<br>
        <button onclick="take('${q.id}')">Paxa</button>
        <button onclick="done('${q.id}')">Klar</button>
      `;

      list.appendChild(div);
    });
  }

  // EMPLOYEE
  let myBox = document.getElementById("myBox");

  if(currentUserId){

    let mine = items.find(x=>x.id===currentUserId);
    let pos = items.findIndex(x=>x.id===currentUserId) + 1;

    if(mine){
      myBox.style.display = "block";
      myBox.className = "mybox " + mine.priority;

      myBox.innerHTML = `
        <b>Din plats: ${pos}</b><br>
        ${mine.priority.toUpperCase()}<br><br>
        <button onclick="removeMy()">Avbryt</button>
        <button onclick="removeMy()">Klar</button>
      `;
    }
  }

});

</script>

</body>
</html>
