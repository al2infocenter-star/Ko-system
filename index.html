<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kösystem</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.hidden { display: none; }

input, select, button {
    padding: 10px;
    margin: 5px;
}

.queue-item {
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
    text-align: left;
}

.red { background: #ffcccc; }
.yellow { background: #fff3cd; }
.green { background: #d4edda; }
</style>
</head>

<body>

<div class="container">

<h2>Kösystem</h2>

<!-- LOGIN -->
<div id="login">
    <h3>Lösenord</h3>
    <input type="password" id="password" placeholder="Lösenord">
    <br>
    <button onclick="checkPassword()">Logga in</button>
</div>

<!-- ROLL -->
<div id="role" class="hidden">
    <h3>Välj roll</h3>
    <button onclick="setRole('employee')">Medarbetare</button>
    <button onclick="setRole('leader')">Arbetsledare</button>
</div>

<!-- MEDARBETARE -->
<div id="employee" class="hidden">
    <h3>Medarbetare</h3>

    <input id="empName" placeholder="Ditt namn">

    <br>

    <select id="priority">
        <option value="green">Grön</option>
        <option value="yellow">Gul</option>
        <option value="red">Röd</option>
    </select>

    <br>

    <button onclick="joinQueue()">Ställ dig i kö</button>

    <h4>Din status:</h4>
    <div id="myStatus"></div>
</div>

<!-- ARBETSLEDARE -->
<div id="leader" class="hidden">
    <h3>Arbetsledare</h3>

    <input id="leaderName" placeholder="Ditt namn">

    <h4>Kö</h4>
    <div id="queueList"></div>
</div>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyC3lF1OGlr4em-jUQkz3a-UoeKMOQyFCYw",
  authDomain: "ko-system-ce728.firebaseapp.com",
  projectId: "ko-system-ce728",
  storageBucket: "ko-system-ce728.appspot.com",
  messagingSenderId: "372176706388",
  appId: "1:372176706388:web:16a3d1fbd593480d5546c1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= LOGIC =================

let currentUser = null;
const PASSWORD = "1234";

// LOGIN
function checkPassword() {
    let pw = document.getElementById("password").value;

    if (pw === PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("role").classList.remove("hidden");
    } else {
        alert("Fel lösenord");
    }
}

// ROLE
function setRole(role) {
    document.getElementById("role").classList.add("hidden");
    document.getElementById(role).classList.remove("hidden");
}

// JOIN QUEUE
function joinQueue() {
    let name = document.getElementById("empName").value;
    let priority = document.getElementById("priority").value;

    if (!name) return alert("Skriv namn");

    currentUser = name;

    db.collection("queue").add({
        name: name,
        priority: priority,
        time: Date.now(),
        takenBy: null
    });
}

// REALTIME QUEUE
db.collection("queue").orderBy("time")
.onSnapshot(snapshot => {

    let list = document.getElementById("queueList");
    if (!list) return;

    list.innerHTML = "";

    let index = 1;

    snapshot.forEach(doc => {
        let q = doc.data();

        let div = document.createElement("div");
        div.className = "queue-item " + q.priority;

        div.innerHTML = `
            <b>${index}. ${q.name}</b><br>
            Prioritet: ${q.priority}<br>
            ${q.takenBy ? "Paxad av: " + q.takenBy : "Inte paxad"}
            <br><br>
            <button onclick="take('${doc.id}')">Paxa</button>
            <button onclick="done('${doc.id}')">Klar</button>
        `;

        list.appendChild(div);
        index++;
    });
});

// PAXA
function take(id) {
    let leader = document.getElementById("leaderName").value;
    if (!leader) return alert("Skriv ditt namn först");

    db.collection("queue").doc(id).update({
        takenBy: leader
    });
}

// KLAR / TA BORT
function done(id) {
    db.collection("queue").doc(id).delete();
}

</script>

</body>
</html>
