<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kösystem</title>

<!-- Firebase (compat versions så vi kan använda enkel syntax) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f4f4;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.hidden { display: none; }

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

input, select {
    padding: 10px;
    margin: 5px;
    width: 80%;
}

.queue-item {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    background: white;
    text-align: left;
}

.red { background: #ffcccc; }
.yellow { background: #fff3cd; }
.green { background: #d4edda; }
</style>
</head>

<body>

<div class="container">

<h2>Kösystem</h2>

<!-- LOGIN -->
<div id="login">
    <h3>Lösenord</h3>
    <input type="password" id="password" placeholder="Ange lösenord">
    <br>
    <button onclick="checkPassword()">Logga in</button>
</div>

<!-- ROLL -->
<div id="role" class="hidden">
    <h3>Välj roll</h3>
    <button onclick="setRole('employee')">Medarbetare</button>
    <button onclick="setRole('leader')">Arbetsledare</button>
</div>

<!-- MEDARBETARE -->
<div id="employee" class="hidden">
    <h3>Medarbetare</h3>
    <input id="empName" placeholder="Ditt namn">

    <br>
    <select id="priority">
        <option value="green">Grön</option>
        <option value="yellow">Gul</option>
        <option value="red">Röd</option>
    </select>

    <br>
    <button onclick="joinQueue()">Ställ dig i kö</button>
    <button onclick="leaveQueue()">Avbryt</button>

    <h4>Din status:</h4>
    <div id="myStatus"></div>
</div>

<!-- ARBETSLEDARE -->
<div id="leader" class="hidden">
    <h3>Arbetsledare</h3>
    <input id="leaderName" placeholder="Ditt namn">
    <br>
    <button onclick="loadQueue()">Uppdatera</button>

    <h4>Kö:</h4>
    <div id="queueList"></div>
</div>

</div>

<script>

// ===== FIREBASE INIT =====
const firebaseConfig = {
  apiKey: "DIN_API_KEY",
  authDomain: "DIN_AUTH_DOMAIN",
  projectId: "DIN_PROJECT_ID",
  storageBucket: "DIN_STORAGE",
  messagingSenderId: "DIN_SENDER",
  appId: "DIN_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== APP LOGIC =====

let currentUser = null;
const PASSWORD = "1234";

function checkPassword() {
    let pw = document.getElementById("password").value;
    if (pw === PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("role").classList.remove("hidden");
    } else {
        alert("Fel lösenord");
    }
}

function setRole(role) {
    document.getElementById("role").classList.add("hidden");
    document.getElementById(role).classList.remove("hidden");
}

// ===== MEDARBETARE =====
function joinQueue() {
    let name = document.getElementById("empName").value;
    let priority = document.getElementById("priority").value;

    if (!name) return alert("Skriv namn");

    currentUser = name;

    db.collection("queue").add({
        name: name,
        priority: priority,
        time: Date.now(),
        takenBy: null
    });
}

function leaveQueue() {
    // enkel variant: tas bort manuellt i listan (kan byggas ut senare)
    alert("Funktion kan byggas ut med ID-spårning");
}

// ===== REALTIME QUEUE =====
db.collection("queue").orderBy("time").onSnapshot(snapshot => {
    let list = document.getElementById("queueList");
    if (!list) return;

    list.innerHTML = "";

    let index = 1;

    snapshot.forEach(doc => {
        let q = doc.data();

        let div = document.createElement("div");
        div.className = "queue-item " + q.priority;

        div.innerHTML = `
            <b>${index}. ${q.name}</b><br>
            Prioritet: ${q.priority}<br>
            ${q.takenBy ? "Paxad av: " + q.takenBy : "Inte paxad"}
        `;

        list.appendChild(div);
        index++;
    });
});

function loadQueue() {
    // realtime hanterar detta
}

</script>

</body>
</html>
