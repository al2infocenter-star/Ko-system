<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kösystem</title>

<!-- Firebase (VIKTIGT: compat-version) -->
<script src="https://www.gstatic.com/firebasejs/10.12.12/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.12/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; }
.container { max-width:750px; margin:auto; padding:20px; }
.hidden { display:none; }

input, select, button { padding:10px; margin:5px; }

.queue-item {
  background:white;
  margin:8px;
  padding:10px;
  border-radius:8px;
  text-align:left;
}

.red { background:#ffcccc; }
.yellow { background:#fff3cd; }
.green { background:#d4edda; }

.mybox {
  margin-top:15px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kösystem</h2>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="password" placeholder="Lösenord">
  <br>
  <button onclick="login()">Logga in</button>
</div>

<!-- ROLE -->
<div id="role" class="hidden">
  <button onclick="setRole('employee')">Medarbetare</button>
  <button onclick="setRole('leader')">Arbetsledare</button>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="hidden">
  <h3>Medarbetare</h3>

  <input id="empName" placeholder="Namn">

  <br>

  <label>Prio:</label>
  <select id="priority">
    <option value="red">HÖG</option>
    <option value="yellow">MEDEL</option>
    <option value="green">LÅG</option>
  </select>

  <br>

  <button onclick="joinQueue()">Ställ dig i kö</button>

  <div id="myBox" class="mybox hidden"></div>
</div>

<!-- LEADER -->
<div id="leader" class="hidden">
  <h3>Arbetsledare</h3>

  <input id="leaderName" placeholder="Namn">

  <h4>Kö</h4>
  <div id="queueList"></div>
</div>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyC3lF1OGlr4em-jUQkz3a-UoeKMOQyFCYw",
  authDomain: "ko-system-ce728.firebaseapp.com",
  projectId: "ko-system-ce728",
  storageBucket: "ko-system-ce728.appspot.com",
  messagingSenderId: "372176706388",
  appId: "1:372176706388:web:16a3d1fbd593480d5546c1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= STATE =================
let currentUserId = null;

const prio = {
  red: 1,
  yellow: 2,
  green: 3
};

// ================= LOGIN =================
function login() {
  let pw = document.getElementById("password").value;

  if (pw === "1234") {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("role").classList.remove("hidden");
  } else {
    alert("Fel lösenord");
  }
}

// ================= ROLE =================
function setRole(role) {
  document.getElementById("role").classList.add("hidden");
  document.getElementById(role).classList.remove("hidden");
}

// ================= JOIN QUEUE =================
function joinQueue() {
  let name = document.getElementById("empName").value;
  let priority = document.getElementById("priority").value;

  if (!name) return alert("Skriv namn");

  db.collection("queue").add({
    name,
    priority,
    time: Date.now(),
    takenBy: null
  }).then(doc => {
    currentUserId = doc.id;
  });
}

// ================= EMPLOYEE ACTIONS =================
function removeMy() {
  if (!currentUserId) return;
  db.collection("queue").doc(currentUserId).delete();
  currentUserId = null;
}

// ================= LEADER ACTIONS =================
function take(id) {
  let leader = document.getElementById("leaderName").value;
  if (!leader) return alert("Skriv namn");

  db.collection("queue").doc(id).update({
    takenBy: leader
  });
}

function done(id) {
  db.collection("queue").doc(id).delete();
}

// ================= REALTIME =================
db.collection("queue").onSnapshot(snapshot => {

  let items = [];
  snapshot.forEach(d => items.push({ id: d.id, ...d.data() }));

  // SORT: prio först, sedan tid
  items.sort((a,b)=>{
    if (prio[a.priority] !== prio[b.priority]) {
      return prio[a.priority] - prio[b.priority];
    }
    return a.time - b.time;
  });

  // ===== LEADER VIEW =====
  let list = document.getElementById("queueList");

  if (list) {
    list.innerHTML = "";

    items.forEach((q,i)=>{

      let div = document.createElement("div");
      div.className = "queue-item " + q.priority;

      div.innerHTML = `
        <b>${i+1}. ${q.name}</b><br>
        Prio: ${q.priority.toUpperCase()}<br>
        ${q.takenBy ? "Paxad av: " + q.takenBy : "Inte paxad"}
        <br><br>
        <button onclick="take('${q.id}')">Paxa</button>
        <button onclick="done('${q.id}')">Klar</button>
      `;

      list.appendChild(div);
    });
  }

  // ===== EMPLOYEE VIEW =====
  let myBox = document.getElementById("myBox");

  if (myBox && currentUserId) {

    let myIndex = null;
    let myData = null;

    items.forEach((q,i)=>{
      if (q.id === currentUserId) {
        myIndex = i + 1;
        myData = q;
      }
    });

    if (myData) {
      myBox.classList.remove("hidden");
      myBox.className = "mybox " + myData.priority;

      myBox.innerHTML = `
        <b>Din plats: ${myIndex}</b><br>
        Prio: ${myData.priority.toUpperCase()}<br><br>

        <button onclick="removeMy()">Avbryt</button>
        <button onclick="removeMy()">Klar</button>
      `;
    }
  }
});

</script>

</body>
</html>
